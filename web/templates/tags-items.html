<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/static/3p/htmx.2.0.0.min.js"></script>
  <title>Manage items tag</title>
</head>

<body>
  <div id="content">
  <a href="/">Back to main</a>
    {{ if .Success }}
    <h2>Items tag management</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Tag</th>
          <th>New</th>
        </tr>
      </thead>
      <tbody>
        {{ if len .Items }}
        {{ $reverse := .reverse }}
        {{ range .Items }}
        <tr id="item-{{.Id}}">
          <td>{{.Name}}</td>
          <td>{{.Tag}}</td>
          <td>
            <button hx-get="{{call $reverse "tag-item-edit" .Id}}" hx-target="#item-{{.Id}}">
              Edit</button>
          </td>
        </tr>
        {{ end }}
        {{else}}
        <tr>
          <td colspan="7">No items found</td>
        </tr>
        {{end}}
      </tbody>
    </table>
    {{ else }}
    <h2>Failed to get items</h2>
    <p>{{.message}}</p>
    {{ end }}
  </div>
</body>

</html>
